<!DOCTYPE html>
<html lang="es" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
</head>

<body>
    <div class="calc-shell">

        <!-- TOP BAR -->
        <div class="top-bar">
            <button class="icon-btn" id="histBtn" aria-label="Historial">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="1 4 1 10 7 10" />
                    <path d="M3.51 15a9 9 0 1 0 .49-4.87" />
                </svg>
            </button>
            <button class="icon-btn theme-toggle" id="themeToggle" aria-label="Cambiar tema">
                <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" />
                </svg>
                <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round">
                    <circle cx="12" cy="12" r="5" />
                    <line x1="12" y1="1" x2="12" y2="3" />
                    <line x1="12" y1="21" x2="12" y2="23" />
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                    <line x1="1" y1="12" x2="3" y2="12" />
                    <line x1="21" y1="12" x2="23" y2="12" />
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                </svg>
            </button>
        </div>

        <!-- HISTORIAL PANEL -->
        <div class="history-panel" id="historyPanel">
            <div class="history-header">
                <span>Historial</span>
                <button class="clear-hist" id="clearHist">Limpiar</button>
            </div>
            <ul class="history-list" id="historyList">
                <li class="hist-empty">Sin operaciones aún</li>
            </ul>
        </div>

        <!-- DISPLAY -->
        <section class="display-area" aria-label="Pantalla">
            <div class="expr-wrap">
                <div class="expr-text" id="exprText">0</div>
            </div>
            <div class="result-wrap">
                <div class="result-text" id="resultText"></div>
            </div>
        </section>

        <!-- DIVIDER + TOGGLE CIENTÍFICA -->
        <div class="sci-toggle-row">
            <button class="sci-toggle-btn" id="sciToggle" aria-label="Calculadora científica">
                <svg class="chevron-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="18 15 12 9 6 15" />
                </svg>
            </button>
        </div>

        <!-- PANEL CIENTÍFICO (colapsable) -->
        <div class="sci-panel" id="sciPanel">
            <div class="sci-grid">
                <!-- Fila 1 -->
                <button class="btn btn-sci" data-sci="sqrt">√</button>
                <button class="btn btn-sci" data-sci="pi">π</button>
                <button class="btn btn-sci" data-sci="pow">^</button>
                <button class="btn btn-sci" data-sci="fact">!</button>

                <!-- Fila 2 -->
                <button class="btn btn-sci btn-deg" id="degBtn">Deg</button>
                <button class="btn btn-sci" data-sci="sin">sin</button>
                <button class="btn btn-sci" data-sci="cos">cos</button>
                <button class="btn btn-sci" data-sci="tan">tan</button>

                <!-- Fila 3 -->
                <button class="btn btn-sci btn-inv" id="invBtn">Inv</button>
                <button class="btn btn-sci" data-sci="euler">e</button>
                <button class="btn btn-sci" data-sci="ln">ln</button>
                <button class="btn btn-sci" data-sci="log">log</button>
            </div>
        </div>

        <!-- KEYPAD ESTÁNDAR -->
        <section class="keypad" aria-label="Teclado">
            <button class="btn btn-ctrl" data-val="AC">AC</button>
            <button class="btn btn-ctrl" data-val="(">&nbsp;(&nbsp;)&nbsp;</button>
            <button class="btn btn-ctrl" data-val="%">%</button>
            <button class="btn btn-op" data-val="÷">÷</button>

            <button class="btn btn-num" data-val="7">7</button>
            <button class="btn btn-num" data-val="8">8</button>
            <button class="btn btn-num" data-val="9">9</button>
            <button class="btn btn-op" data-val="×">×</button>

            <button class="btn btn-num" data-val="4">4</button>
            <button class="btn btn-num" data-val="5">5</button>
            <button class="btn btn-num" data-val="6">6</button>
            <button class="btn btn-op" data-val="−">−</button>

            <button class="btn btn-num" data-val="1">1</button>
            <button class="btn btn-num" data-val="2">2</button>
            <button class="btn btn-num" data-val="3">3</button>
            <button class="btn btn-op" data-val="+">+</button>

            <button class="btn btn-num" data-val="0">0</button>
            <button class="btn btn-num" data-val=".">.</button>
            <button class="btn btn-ctrl btn-del" data-val="DEL">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z" />
                    <line x1="18" y1="9" x2="12" y2="15" />
                    <line x1="12" y1="9" x2="18" y2="15" />
                </svg>
            </button>
            <button class="btn btn-eq" data-val="=">=</button>
        </section>

    </div>
    <script src="script.js"></script>
</body>

</html>
